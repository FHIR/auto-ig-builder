name: Build and Push Candidate Docker Images

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to build'
        default: 'master'
        required: true
  push:
    branches:
      - master
    paths:
      - 'images/ig-publisher/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      GHCR_IMAGE: ghcr.io/fhir/ig-publisher-localdev
      DOCKERHUB_IMAGE: hl7fhir/ig-publisher-base

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.ref || github.ref }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Set candidate tag
      run: echo "CANDIDATE_TAG=candidate-$(git rev-parse --short=12 HEAD)" >> "$GITHUB_ENV"

    - name: Log in to GHCR
      uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to Docker Hub
      uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push candidate images
      run: |
        set -euo pipefail
        docker buildx build --push \
          --platform linux/amd64,linux/arm64 \
          --target localdev \
          -t "${GHCR_IMAGE}:${CANDIDATE_TAG}" \
          -t "${DOCKERHUB_IMAGE}:${CANDIDATE_TAG}" \
          images/ig-publisher

    - name: Show published candidate tags
      run: |
        echo "Published ${GHCR_IMAGE}:${CANDIDATE_TAG}"
        echo "Published ${DOCKERHUB_IMAGE}:${CANDIDATE_TAG}"
